name: goto-test-config
order: 1
mcp:
  toolSchemas:
    - name: default
      inputSchema:
        type: object
        required: []
    - name: basic-text-delay-schema
      inputSchema:
        type: object
        properties:
          text:
            type: string
            description: input text
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
          count:
            type: int
            description: 'Count'
          status:
            type: int
            description: 'Status'
          metadata:
            type: object
            description: metadata
        required: []
    - name: tool-call-schema
      inputSchema:
        type: object
        properties:
          tool:
            type: string
            description: Tool1 to execute on the remote MCP server
          url:
            type: string
            description: Remote MCP Server URL
          authority:
            type: string
            description: HTTP Authority to use for the remote call
          sse:
            type: boolean
            description: Whether to invoke the remote call over SSE or StreamableHTTP
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
          headers:
            type: object
            description: Header configs to apply to tool call. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
          metadata:
            type: object
            description: metadata
          args:
            type: object
            description: Arguments to pass to the remote tool. JSON object with k:v.
          count:
            type: int
            description: 'Count'
        required: []
    - name: fetch-schema
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: url to fetch
          authority:
            type: string
            description: HTTP Authority to use for the remote host
          headers:
            type: object
            description: Headers configs to apply to the HTTP request. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
          count:
            type: int
            description: 'Count'
          metadata:
            type: object
            description: metadata
        required: []
    - name: remote-tool-schema
      inputSchema:
        type: object
        properties:
          tool:
            type: string
            description: Tool to execute on the remote MCP server
          url:
            type: string
            description: Remote MCP Server URL
          authority:
            type: string
            description: HTTP Authority to use for the remote call
          sse:
            type: boolean
            description: Whether to invoke the remote call over SSE or StreamableHTTP
          h2:
            type: boolean
            description: Whether to invoke the remote call over HTTP/2
          tls:
            type: boolean
            description: Whether to invoke the remote call over TLS
          count:
            type: int
            description: Number of requests to send
          concurrent:
            type: int
            description: Number of concurrent requests to send
          initialDelay:
            type: string
            description: 'Initial delay on the client side before making the remote tool call  (duration syntax: 5s)'
          requestDelay:
            type: string
            description: 'Delay before the next round of calls on the client side when multiple rounds of tool calls are to be made (duration syntax: 5s)'
          delay:
            type: string
            description: 'Request the remote tool to delay the response artificially on the server side (duration syntax: 5s)'
          headers:
            type: object
            description: Header configs to apply to tool call. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
              h:v.
          metadata:
            type: object
            description: metadata
          args:
            type: object
            description: Arguments to pass to the remote tool. JSON object with k:v. Can include "headers" config as an arg, meant to be applied by the remote tool for its own outbound calls.
        required: []
    - name: agent-call-schema
      inputSchema:
        type: object
        properties:
          agent:
            type: string
            description: Agent to execute
          agentURL:
            type: string
            description: Agent URL
          cardURL:
            type: string
            description: Agent URL
          authority:
            type: string
            description: HTTP Authority to use for the remote call
          h2:
            type: boolean
            description: Whether to invoke the remote call over HTTP/2
          tls:
            type: boolean
            description: Whether to invoke the remote call over TLS
          message:
            type: string
            description: Message to send to the remote agent
          data:
            type: object
            description: Data to send to the remote agent
          headers:
            type: object
            description: Header configs to apply to tool call. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
          count:
            type: int
            description: Number of requests to send
          concurrent:
            type: int
            description: Number of concurrent requests to send
          initialDelay:
            type: string
            description: 'Initial delay on the client side before making the remote agent call  (duration syntax: 5s)'
          requestDelay:
            type: string
            description: 'Delay before the next round of calls on the client side when multiple rounds of agent calls are to be made (duration syntax: 5s)'
          delay:
            type: string
            description: 'Request the remote agent to delay the response artificially on the server side (duration syntax: 5s)'
          metadata:
            type: object
            description: metadata
        required: []
  servers:
    - port: 3000
      server:
        name: goto-mcp-1
        port: 3000
        uri: "/mcp/goto-mcp-1"
        description: "Stateful MCP Server at URI [/mcp/goto-mcp-1] on Host [${POD_NAME}] Port [3000] @NS [ns] @ Cluster [local]"
        version: "1.0"
        instructions: "This is a stateful MCP server that even remembers where you went for lunch yesterday"
        pageSize: 50
        keepAlive: 0
        hasPrompts: true
        hasResources: true
        hasTools: true
        stateless: false
        enabled: true
      tools:
        - name: call-agent
          tool:
            name: call-agent
            description: 'From Server [goto-mcp-1@${POD_NAME}:3000@ns@local], call agent [default: goto-agent-1] on remote MCP server [goto-mcp-1] at URL[localhost:3000/agent/goto-agent-1]'
          schema: agent-call-schema
          behavior:
            agents: true
          config:
            agent:
              name: goto-agent-1
              agentURL: "localhost:3000/agent/goto-agent-1"
              cardURL: "localhost:3000/agent/goto-agent-1/.well-known/agent.json"
              authority: "localhost"
              h2: false
              tls: false
              delay: "1s"
              message: "insecure"
              headers:
                request:
                  add:
                    caller: "remote-remote-toolcall@goto-mcp-1@${POD_NAME}:3000@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
                    - foo
        - name: "toolcall"
          tool:
            name: "toolcall"
            description: "Call a tool on another MCP server from server goto-mcp-1@${POD_NAME}@ns@local"
          schema: tool-call-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "-"
              server: "-"
              url: "-"
              sseURL: "-"
              forceSSE: false
              authority: "-"
              delay: 1s
              headers:
                request:
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args: {}
        - name: ping
          tool:
            name: ping
            description: Ping client from server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            ping: true
        - name: echo
          tool:
            name: echo
            description: Echo back from server goto-mcp-1@${POD_NAME}@ns@local
          schema: basic-text-delay-schema
          behavior:
            echo: true
        - name: time
          tool:
            name: time
            description: Get current time from server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            time: true
        - name: fetch
          tool:
            name: fetch
            description: Fetch HTTP resource from [localhost:8081]
          schema: fetch-schema
          behavior:
            fetch: true
          config:
            remote:
              url: "localhost:8081"
              authority: "localhost"
              headers:
                request:
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
        - name: stream
          tool:
            name: stream
            description: long running streaming tool, with stream out and progress notifications from server goto-mcp-1@${POD_NAME}@ns@local
          schema: basic-text-delay-schema
          behavior:
            stream: true
          config:
            delay:
              min: 1s
              max: 5s
              count: -1
        - name: sample
          tool:
            name: sample
            description: sample something from client for server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            sample: true
        - name: listRoots
          tool:
            name: listRoots
            description: Get list of roots from client for server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            listRoots: true
        - name: elicit
          tool:
            name: elicit
            description: elicit something from LLM for server goto-mcp-1@${POD_NAME}@ns@local
            inputSchema:
              type: object
              properties:
                requestedSchema:
                  type: object
                  description: Schema to send back to the client as Elicitation request
                message:
                  type: string
                  description: Message to send back to the client as Elicitation request
                delay:
                  type: string
                  description: 'Delay the response artificially (duration syntax: 5s)'
              required: []
          behavior:
            elicit: true
          response:
            message: provide a random string for server goto-mcp-1@${POD_NAME}@ns@local
            requestedSchema:
              type: object
              properties:
                theAsk:
                  type: string
        - name: status
          tool:
            name: status
            description: Status check from server goto-mcp-1@${POD_NAME}:3000@ns@local
          schema: basic-text-delay-schema
          behavior:
            status: true
        - name: remote-status
          tool:
            name: remote-status
            description: 'From Server [goto-mcp-1@${POD_NAME}:3000@ns@local], call tool [default: status] on remote MCP server [goto-mcp-4000] at URL[http://localhost:4000/mcp/goto-mcp-4000], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "status"
              server: "goto-mcp-4000"
              url: "localhost:4000/mcp/goto-mcp-4000/status"
              tls: false
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              requestCount: 1
              concurrent: 1
              initialDelay: "1s"
              requestDelay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-echo@goto-mcp-1@${POD_NAME}:3000@ns@local"
                    foo: "remote-echo-3000"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
                    - caller
              args:
                remoteArgs:
                  status: 401
                headers:
                  Accept: "application/json"
        - name: remote-echo
          tool:
            name: remote-echo
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: echo] on remote MCP server [goto-mcp-1] at URL[https://localhost:4000/mcp/goto-mcp-1/echo], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "echo"
              server: "goto-mcp-1"
              url: "https://localhost:4000/mcp/goto-mcp-1/echo"
              tls: true
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              requestCount: 2
              concurrent: 1
              initialDelay: "1s"
              requestDelay: "5s"
              headers:
                request:
                  add:
                    caller: "remote-echo@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling echo@goto-mcp-1 from MCP tool remote-echo@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - name: remote-elicit
          tool:
            name: remote-elicit
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: elicit] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/elicit], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "elicit"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/elicit"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-elicit@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling elicit@goto-mcp-1 from MCP tool remote-elicit@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - name: remote-fetch
          tool:
            name: remote-fetch
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: fetch] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/fetch], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "fetch"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/fetch"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-fetch@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling fetch@goto-mcp-1 from MCP tool remote-fetch@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - name: remote-stream
          tool:
            name: remote-stream
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: stream] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/stream], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "stream"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/stream"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-stream@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling stream@goto-mcp-1 from MCP tool remote-stream@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - name: remote-toolcall
          tool:
            name: remote-toolcall
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: toolcall] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/toolcall], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "toolcall"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/toolcall"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-toolcall@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling toolcall@goto-mcp-1 from MCP tool remote-toolcall@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - name: remote-remote-echo
          tool:
            name: remote-remote-echo
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool remote-echo on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/remote-echo], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "remote-echo"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/remote-echo"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-remote-echo@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling remote-echo@goto-mcp-1 from MCP tool remote-remote-echo@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - name: remote-remote-toolcall
          tool:
            name: remote-remote-toolcall
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: remote-toolcall] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/remote-toolcall], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "remote-toolcall"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/remote-toolcall"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-remote-toolcall@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling remote-toolcall@goto-mcp-1 from MCP tool remote-remote-toolcall@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
      prompts:
        - prompt:
            name: prompt1
            description: Get meeting minutes and recap from goto-mcp-1@${POD_NAME}@ns@local
            arguments:
            - name: meeting_id
              description: Meeting ID for which to fetch recap
              required: true
          payload:
            text: Prompt from Server goto-mcp-1@${POD_NAME}@ns@local
        - prompt:
            name: prompt2
            description: Get PR comments from goto-mcp-1@${POD_NAME}@ns@local
            arguments:
            - name: user_id
              description: User ID for whom recent PR comments should be fetched
              required: true
          payload:
            textStream:
            - Prompt 1 from Server goto-mcp-1@${POD_NAME}@ns@local
            - Prompt 2 from Server goto-mcp-1@${POD_NAME}@ns@local
      resources:
        - resource:
            name: ResourceA
            title: ResourceA
            description: A Resource on goto-mcp-1@${POD_NAME}@ns@local
            size: 100
            uri: audio://resources/a
            mimeType: audio/aac
            text: This is a sample resource A on server goto-mcp-1@${POD_NAME}@ns@local
            blob: Resource A Blob from server goto-mcp-1@${POD_NAME}@ns@local
        - resource:
            name: ResourceB
            title: ResourceB
            description: B Resource on goto-mcp-1@${POD_NAME}@ns@local
            size: 200
            uri: ftp://resources/b
            mimeType: text/plain
            text: This is a sample resource B on server goto-mcp-1@${POD_NAME}@ns@local
            blob: Resource B Blob from server goto-mcp-1@${POD_NAME}@ns@local
        - resource:
            name: ResourceC
            title: ResourceC
            description: C Resource on goto-mcp-1@${POD_NAME}@ns@local
            size: 300
            uri: video://resources/c
            mimeType: video/mp4
            text: This is a sample resource C on server goto-mcp-1@${POD_NAME}@ns@local
            blob: Resource C Blob from server goto-mcp-1@${POD_NAME}@ns@local
      templates:
        - template:
            name: TemplateA
            title: TemplateA
            description: A Template on goto-mcp-1@${POD_NAME}@ns@local
            uriTemplate: audio://templates/a
            mimeType: audio/aac
            text: This is template A on server goto-mcp-1@${POD_NAME}@ns@local
        - template:
            name: TemplateB
            title: TemplateB
            description: B Template on goto-mcp-1@${POD_NAME}@ns@local
            uriTemplate: ftp://templates/b
            mimeType: text/plain
            text: This is template B on server goto-mcp-1@${POD_NAME}@ns@local
        - template:
            name: TemplateC
            title: TemplateC
            description: C Template on goto-mcp-1@${POD_NAME}@ns@local
            uriTemplate: video://templates/c
            mimeType: video/mp4
            text: This is template C on server goto-mcp-1@${POD_NAME}@ns@local
      payloads:
        server:
          completions:
            list:
            - "Completion 1 from server goto-mcp-1@${POD_NAME}@ns@local"
            - "Completion 2 from server goto-mcp-1@${POD_NAME}@ns@local"
            - "Completion 3 from server goto-mcp-1@${POD_NAME}@ns@local"
            delay: 1s
          toolPayloads:
            - name: sample
              payload:
                message: sample something for server goto-mcp-1@${POD_NAME}@ns@local
                requestedSchema:
                  type: object
                  properties:
                    sample:
                      type: string
            - name: elicit
              payload:
                message: elciit something for server goto-mcp-1@${POD_NAME}@ns@local
                requestedSchema:
                  type: object
                  properties:
                    elicit:
                      type: string
                    theAsk:
                      type: string
          streamPayloads:
            - name: stream
              payload:
                count: 10
                delay: 1s
                data:
                - payload: stream response 1/4 from server goto-mcp-1@${POD_NAME}@ns@local
                - payload: stream response 2/4 from server goto-mcp-1@${POD_NAME}@ns@local
                - payload: stream response 3/4 from server goto-mcp-1@${POD_NAME}@ns@local
                - payload: stream response 4/4 from server goto-mcp-1@${POD_NAME}@ns@local
        client:
          sample:
            models:
            - "goto-mcp-1@${POD_NAME}@ns@local-model1"
            - "goto-mcp-1@${POD_NAME}@ns@local-model2"
            roles:
            - user
            - system
            - assistant
            - none
            contents:
            - "goto-mcp-1@${POD_NAME}@ns@local: sampling successful on client"
            - "goto-mcp-1@${POD_NAME}@ns@local: sampling denied on client"
            actions:
            - accept
            - reject
            delay:
              min: 2s
              max: 5s
              count: -1
          elicit:
            models:
            - "goto-mcp-1@${POD_NAME}@ns@local-Model1"
            - "goto-mcp-1@${POD_NAME}@ns@local-Model2"
            roles:
            - user
            - system
            - assistant
            - none
            contents:
            - "goto-mcp-1@${POD_NAME}@ns@local: elicit accepted on client"
            - "goto-mcp-1@${POD_NAME}@ns@local: elicit refused by user on client"
            actions:
            - accept
            - reject
            delay:
              min: 2s
              max: 5s
              count: -1
          roots:
            - name: Root 1 on goto-mcp-1@${POD_NAME}@ns@local
              uri: "/root1"
            - name: Root 2 on goto-mcp-1@${POD_NAME}@ns@local
              uri: "/root2"
            - name: Root 3 on goto-mcp-1@${POD_NAME}@ns@local
              uri: "/root3"
