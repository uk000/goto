grpc:
  protos:
    - name: xGoto
      path: ./protos
      content: |
        syntax = "proto3";
        option go_package=".;pb";
        message xInput {
          string text = 1;
        }
        message xStreamConfig {
          int32  chunkSize = 1;
          int32  chunkCount = 2;
          string interval = 3;
          string text = 4;
        }
        message xOutput {
          string id = 1;
          string text = 2;
          string at = 3;
          string gotoHost = 4;
          int32  gotoPort = 5;
          string viaGoto = 6;
        }
        service xGoto {
          rpc echo(xInput) returns (xOutput) {}
          rpc streamIn(stream xInput) returns (xOutput) {}
          rpc streamOut(xStreamConfig) returns (stream xOutput) {}
          rpc streamInOut(stream xStreamConfig) returns (stream xOutput) {}
        }
    - name: ServiceA
      path: ./protos
      content: |
        syntax = "proto3";
        option go_package=".;pb";
        message aSampleRequest {
          int32 id = 1;
          string content = 2;
        }
        message aSampleResponse {
          int32 id = 1;
          string content = 2;
        }
        service ServiceA {
          rpc oneOne(aSampleRequest) returns (aSampleResponse) {}
          rpc oneMany(aSampleRequest) returns (stream aSampleResponse) {}
          rpc manyOne(stream aSampleRequest) returns (aSampleResponse) {}
          rpc manyMany(stream aSampleRequest) returns (stream aSampleResponse) {}
        }      
  proxy:

