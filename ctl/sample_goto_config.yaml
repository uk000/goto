            name: TemplateA
            title: TemplateA
            description: A Template on goto-mcp-1@${POD_NAME}@ns@local
            uriTemplate: audio://templates/a
            mimeType: audio/aac
            text: This is template A on server goto-mcp-1@${POD_NAME}@ns@local
        - template:
            name: TemplateB
            title: TemplateB
            description: B Template on goto-mcp-1@${POD_NAME}@ns@local
            uriTemplate: ftp://templates/b
            mimeType: text/plain
            text: This is template B on server goto-mcp-1@${POD_NAME}@ns@local
        - template:
            name: TemplateC
            title: TemplateC
            description: C Template on goto-mcp-1@${POD_NAME}@ns@local
            uriTemplate: video://templates/c
            mimeType: video/mp4
            text: This is template C on server goto-mcp-1@${POD_NAME}@ns@local
      payloads:
        server:
          completions:
            list:
            - "Completion 1 from server goto-mcp-1@${POD_NAME}@ns@local"
            - "Completion 2 from server goto-mcp-1@${POD_NAME}@ns@local"
            - "Completion 3 from server goto-mcp-1@${POD_NAME}@ns@local"
            delay: 1s
          toolPayloads:
            - name: sample
              payload:
                message: sample something for server goto-mcp-1@${POD_NAME}@ns@local
                requestedSchema:
                  type: object
                  properties:
                    sample:
                      type: string
            - name: elicit
              payload:
                message: elciit something for server goto-mcp-1@${POD_NAME}@ns@local
                requestedSchema:
                  type: object
                  properties:
                    elicit:
                      type: string
                    theAsk:
                      type: string
          streamPayloads:
            - name: stream
              payload:
                count: 10
                delay: 1s
                data:
                - payload: stream response 1/4 from server goto-mcp-1@${POD_NAME}@ns@local
                - payload: stream response 2/4 from server goto-mcp-1@${POD_NAME}@ns@local
                - payload: stream response 3/4 from server goto-mcp-1@${POD_NAME}@ns@local
                - payload: stream response 4/4 from server goto-mcp-1@${POD_NAME}@ns@local
        client:
          sample:
            models:
            - "goto-mcp-1@${POD_NAME}@ns@local-model1"
            - "goto-mcp-1@${POD_NAME}@ns@local-model2"
            roles:
            - user
            - system
            - assistant
            - none
            contents:
            - "goto-mcp-1@${POD_NAME}@ns@local: sampling successful on client"
            - "goto-mcp-1@${POD_NAME}@ns@local: sampling denied on client"
            actions:
            - accept
            - reject
            delay:
              min: 2s
              max: 5s
              count: -1
          elicit:
            models:
            - "goto-mcp-1@${POD_NAME}@ns@local-Model1"
            - "goto-mcp-1@${POD_NAME}@ns@local-Model2"
            roles:
            - user
            - system
            - assistant
            - none
            contents:
            - "goto-mcp-1@${POD_NAME}@ns@local: elicit accepted on client"
            - "goto-mcp-1@${POD_NAME}@ns@local: elicit refused by user on client"
            actions:
            - accept
            - reject
            delay:
              min: 2s
              max: 5s
              count: -1
          roots:
            - name: Root 1 on goto-mcp-1@${POD_NAME}@ns@local
              uri: "/root1"
            - name: Root 2 on goto-mcp-1@${POD_NAME}@ns@local
              uri: "/root2"
            - name: Root 3 on goto-mcp-1@${POD_NAME}@ns@local
              uri: "/root3"
a2a:
  agents:
    - port: 3000
      agent:
        card:
          protocolVersion: 0.2.2
          version: "1.0"
          name: goto-agent-1
          description: "This is agent goto-agent-1@${POD_NAME}@ns@local with skills: echo elicit fetch stream"
          url: http://localhost:3000/agent/goto-agent-1/
          preferredTransport: ""
          additionalInterfaces:
            - url: http://localhost:3000/agent/goto-agent-1/grpc
              transport: grpc
          provider:
            organization: Goto
            url: http://goto.goto
          documentationUrl: http://foo.bar
          capabilities:
            streaming: true
            pushNotifications: false
            stateTransitionHistory: true
            extensions:
              - uri: /foo
              - uri: /bar
          defaultInputModes:
            - text
          defaultOutputModes:
            - text
            - task-status
          skills:
            - id: fetch
              name: fetch
              description: skill of fetch
              tags:
                - fetch
              examples:
                - what is fetch
                - how to fetch
                - when to fetch
                - explain fetch
              inputModes:
                - text
              outputModes:
                - text
                - task-status
            - id: elicit
              name: elicit
              description: skill of elicit
              tags:
                - elicit
              examples:
                - what is elicit
                - how to elicit
                - when to elicit
                - explain elicit
              inputModes:
                - text
              outputModes:
                - text
                - task-status
            - id: echo
              name: echo
              description: skill of echo
              tags:
                - echo
              examples:
                - what is echo
                - how to echo
                - when to echo
                - explain echo
              inputModes:
                - text
              outputModes:
                - text
                - task-status
            - id: federate
              name: federate
              description: skill of federate
              tags:
                - federate
              examples:
                - what is federate
                - how to federate
                - when to federate
                - explain federate
              inputModes:
                - text
              outputModes:
                - text
                - task-status
            - id: stream
              name: stream
              description: skill of stream
              tags:
                - stream
              examples:
                - what is stream
                - how to do stream
                - when to do stream
                - explain stream
              inputModes:
                - text
              outputModes:
                - text
                - task-status
          supportsAuthenticatedExtendedCard: false
        behavior:
          federate: true
        config:
          delay:
            min: 0.1s
            max: 0.2s
            count: -1
          delegates:
            tools:
              echo:
                triggers:
                  - echo
                  - feedback
                  - response
                toolCall:
                  tool: echo
                  url: localhost:3000/mcp/goto-mcp-1/echo
                  sseURL: ""
                  server: goto-mcp-1
                  authority: localhost
                  delay: 10ms
                  args:
                    text: Hello from agent goto-agent-1@${POD_NAME}@ns@local
                  headers:
                    request:
                      add:
                        foo: echo
                      remove:
                        - bar
                      forward:
                        - Traceparent
                        - Tracestate
                        - Authorization
                substitutes:
                  mcp1:
                    url: localhost:3000/mcp/goto-mcp-1/echo
                    authority: localhost
                  mcp2:
                    url: localhost:4000/mcp/goto-mcp-2/echo
                    authority: localhost
                  mcp3:
                    url: localhost:4000/mcp/goto-mcp-3/echo
                    authority: localhost
              echo2:
                triggers:
                  - echo
                  - echo2
                toolCall:
                  tool: echo
                  url: localhost:4000/mcp/goto-mcp-2/echo
                  sseURL: ""
                  server: goto-mcp-2
                  authority: localhost
                  delay: 10ms
                  args:
                    text: Hello from agent goto-agent-1@${POD_NAME}@ns@local
                  headers:
                    request:
                      add:
                        foo: echo2
                      remove:
                        - bar
                      forward:
                        - Traceparent
