grpc:
  config:
    protos:
      - name: goto-proto
        path: /mnt/d/Code/goto/pkg/grpc/grpc.proto
      - name: sample-proto
        path: /mnt/d/Code/goto/pkg/grpc/sample.proto
    services:
      - service: Goto
        port: 8000
        methods:
          - method: echo
            responses:
              - payload:
                  payload: "Hello from Goto"
                  at: now
                  gotoHost: "goto@localhost:8000"
                  gotoPort: 8000
                  viaGoto: "test goto"
                contentType: application/json
              - match:
                  headers:
                    - name: foo
                      value: xyz
                    - name: bar
                payload:
                  payload: "Header foo with value xyz, and bar"
                  at: now
                  gotoHost: "goto@localhost:8000"
                  gotoPort: 8000
                  viaGoto: "test goto"
                contentType: application/json
              - match:
                  headers:
                    - name: foo
                    - name: bar
                      value: abc
                payload:
                  payload: "Header bar with value xyz, and foo"
                  at: now
                  gotoHost: "goto@localhost:8000"
                  gotoPort: 8000
                  viaGoto: "test goto"
                contentType: application/json
      - service: SampleService
        port: 9000
        methods:
          - method: oneOne
            responses:
              - payload:
                  id: 1
                  content: "Hello SampleService.oneOne"
                contentType: application/json
          - method: manyOne
            responses:
              - payload:
                  id: 2
                  content: "Hello SampleService.manyOne"
                contentType: application/json
          - method: oneMany
            responses:
              - stream:
                  count: 5
                  delay: 1s
                payload:
                  id: 1
                  content: "Hello SampleService.oneMany"
                contentType: application/json
              - match:
                  headers:
                    - name: foo
                    - name: bar
                      value: abc
                stream:
                  count: 5
                  delay: 1s
                payload:
                  id: 1
                  content: "Hello SampleService.oneMany"
                contentType: application/json
  serve:
    - Goto
    - SampleService
registry:
  locker: locker1
traffic:
  config:
    tracking:
      headers:
        - name: Goto-Host
        - name: Via-Goto
      time:
        buckets:
          - 0-100
          - 100-200
          - 200-500
          - 500-
    targets:
      - name: validate-status
        method: POST
        protocol: "HTTP/2"
        url: "http://localhost:8082/status/418"
        replicas: 1
        requestCount: 1
        expectation:
          statusCode: 418
        autoInvoke: true
      - name: validate-payload-length
        method: POST
