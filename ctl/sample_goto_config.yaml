                    bar: "{bar}"
                - uriPrefix: /bar/{bar}
                  headers:
                    foo: "{foo}"
              endpoints:
                - ep8081
              transform:
                uriMap:
                  /foo/{foo}: /bar/{bar}
                  /bar/{bar}: /foo/{foo}
                headers:
                  add:
                    target: "target1.1"
                    endpoint: "ep8081"
                    foo: "foo-8081"
                  remove:
                    - foo
                    - bar
                queries:
                  add:
                    a: qqq
                requestId:
                  send: true
                  uuid: true
                  header: x-request-id
                  query: request-id
              trafficConfig:
                delay:
                  min: 0s
                  max: 0s
