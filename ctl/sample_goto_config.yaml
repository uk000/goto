name: goto-test-config
mcp:
  toolSchemas:
    - name: default
      inputSchema:
        type: object
        required: []
    - name: basic-text-delay-schema
      inputSchema:
        type: object
        properties:
          text:
            type: string
            description: input text
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
        required: []
    - name: tool-call-schema
      inputSchema:
        type: object
        properties:
          tool:
            type: string
            description: Tool1 to execute on the remote MCP server
          url:
            type: string
            description: Remote MCP Server URL
          authority:
            type: string
            description: HTTP Authority to use for the remote call
          sse:
            type: boolean
            description: Whether to invoke the remote call over SSE or StreamableHTTP
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
          headers:
            type: object
            description: Header configs to apply to tool call. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
          args:
            type: object
            description: Arguments to pass to the remote tool. JSON object with k:v.
        required:
        - tool
        - url
    - name: fetch-schema
      inputSchema:
        type: object
        properties:
          url:
            type: string
            description: url to fetch
          authority:
            type: string
            description: HTTP Authority to use for the remote host
          headers:
            type: object
            description: Headers configs to apply to the HTTP request. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
        required:
        - url
    - name: remote-tool-schema
      inputSchema:
        type: object
        properties:
          tool:
            type: string
            description: Tool to execute on the remote MCP server
          url:
            type: string
            description: Remote MCP Server URL
          authority:
            type: string
            description: HTTP Authority to use for the remote call
          sse:
            type: boolean
            description: Whether to invoke the remote call over SSE or StreamableHTTP
          delay:
            type: string
            description: 'Delay the response artificially (duration syntax: 5s)'
          headers:
            type: object
            description: Header configs to apply to tool call. {"request":{"add":{"h":"v"},"remove":["h"],"forward":["h"]},"response":{"add":{"h":"v"},"remove":["h"],"forward":["h"]}}
              h:v.
          args:
            type: object
            description: Arguments to pass to the remote tool. JSON object with k:v. Can include "headers" config as an arg, meant to be applied by the remote tool for its own outbound calls.
        required: []
  servers:
    - server:
        name: goto-mcp-1
        port: 3000
        uri: "/mcp/goto-mcp-1"
        description: "Stateful MCP Server at URI [/mcp/goto-mcp-1] on Host [${POD_NAME}] Port [3000] @NS [ns] @ Cluster [local]"
        version: "1.0"
        instructions: "This is a stateful MCP server that even remembers where you went for lunch yesterday"
        pageSize: 50
        keepAlive: 0
        hasPrompts: true
        hasResources: true
        hasTools: true
        stateless: false
        enabled: true
      tools:
        - tool:
            name: "toolcall"
            description: "Call a tool on another MCP server from server goto-mcp-1@${POD_NAME}@ns@local"
          schema: tool-call-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "-"
              server: "-"
              url: "-"
              sseURL: "-"
              forceSSE: false
              authority: "-"
              delay: 1s
              headers:
                request:
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args: {}
        - tool:
            name: ping
            description: Ping client from server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            ping: true
        - tool:
            name: echo
            description: Echo back from server goto-mcp-1@${POD_NAME}@ns@local
          schema: basic-text-delay-schema
          behavior:
            echo: true
        - tool:
            name: time
            description: Get current time from server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            time: true
        - tool:
            name: fetch
            description: Fetch HTTP resource from [localhost:8081]
          schema: fetch-schema
          behavior:
            fetch: true
          config:
            remote:
              url: "localhost:8081"
              authority: "localhost"
              headers:
                request:
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
        - tool:
            name: stream
            description: long running streaming tool, with stream out and progress notifications from server goto-mcp-1@${POD_NAME}@ns@local
          schema: basic-text-delay-schema
          behavior:
            stream: true
          config:
            delay:
              min: 1s
              max: 5s
              count: -1
        - tool:
            name: sample
            description: sample something from client for server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            sample: true
        - tool:
            name: listRoots
            description: Get list of roots from client for server goto-mcp-1@${POD_NAME}@ns@local
          behavior:
            listRoots: true
        - tool:
            name: elicit
            description: elicit something from LLM for server goto-mcp-1@${POD_NAME}@ns@local
            inputSchema:
              type: object
              properties:
                requestedSchema:
                  type: object
                  description: Schema to send back to the client as Elicitation request
                message:
                  type: string
                  description: Message to send back to the client as Elicitation request
                delay:
                  type: string
                  description: 'Delay the response artificially (duration syntax: 5s)'
              required: []
          behavior:
            elicit: true
          response:
            message: provide a random string for server goto-mcp-1@${POD_NAME}@ns@local
            requestedSchema:
              type: object
              properties:
                theAsk:
                  type: string
        - tool:
            name: remote-serverdetails
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: ServerDetails] on remote MCP server at URL[localhost:4000/mcp/goto-mcp-1/serverdetails], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
          schema: remote-tool-schema
          behavior:
            remote: true
          config:
            remote:
              tool: "ServerDetails"
              server: "goto-mcp-1"
              url: "localhost:4000/mcp/goto-mcp-1/serverdetails"
              sseURL: ""
              forceSSE: false
              authority: "localhost"
              delay: "1s"
              headers:
                request:
                  add:
                    caller: "remote-server-details@goto-mcp-1@${POD_NAME}@ns@local"
                  forward:
                    - Traceparent
                    - Tracestate
                    - Authorization
              args:
                text: "Calling ServerDetails@goto-mcp-1 from MCP tool remote-serverdetails@goto-mcp-1@${POD_NAME}@ns@local"
                headers:
                  Accept: "application/json"
        - tool:
            name: remote-listservers
            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: ListServers] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/allservers], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
