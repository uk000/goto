      prompts:
        - prompt:
            name: meeting_recap_prompt
            description: Get meeting minutes and recap from goto-mcp-1@${POD_NAME}@ns@local
            arguments:
            - name: meeting_id
              description: Meeting ID for which to fetch recap
              required: true
          payload:
            text: Prompt from Server goto-mcp-1@${POD_NAME}@ns@local
        - prompt:
            name: github_pr_comments_prompt
            description: Get PR comments from goto-mcp-1@${POD_NAME}@ns@local
            arguments:
            - name: user_id
              description: User ID for whom recent PR comments should be fetched
              required: true
          payload:
            textStream:
            - Prompt 1 from Server goto-mcp-1@${POD_NAME}@ns@local
            - Prompt 2 from Server goto-mcp-1@${POD_NAME}@ns@local
      resources:
        - resource:
            name: ResourceA
            title: ResourceA
            description: A Resource on goto-mcp-1@${POD_NAME}@ns@local
            size: 100
            uri: audio://resources/a
            mimeType: audio/aac
            text: This is a sample resource A on server goto-mcp-1@${POD_NAME}@ns@local
            blob: Resource A Blob from server goto-mcp-1@${POD_NAME}@ns@local
        - resource:
            name: ResourceB
            title: ResourceB
            description: B Resource on goto-mcp-1@${POD_NAME}@ns@local
            size: 200
            uri: ftp://resources/b
            mimeType: text/plain
            text: This is a sample resource B on server goto-mcp-1@${POD_NAME}@ns@local
            blob: Resource B Blob from server goto-mcp-1@${POD_NAME}@ns@local
        - resource:
            name: ResourceC
            title: ResourceC
            description: C Resource on goto-mcp-1@${POD_NAME}@ns@local
            size: 300
            uri: video://resources/c
            mimeType: video/mp4
            text: This is a sample resource C on server goto-mcp-1@${POD_NAME}@ns@local
