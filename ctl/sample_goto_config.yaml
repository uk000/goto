            description: 'From Server [goto-mcp-1@${POD_NAME}@ns@local], call tool [default: echo] on remote MCP server [goto-mcp-1] at URL[localhost:4000/mcp/goto-mcp-1/echo], SSE[false], Authority[localhost],  Headers[foo:bar], Args[]'
