        url: "http://localhost:8082/echo/stream"
        streamPayload:
          - "{firstbody}"
          - "{secondbody}"
          - "{thirdbody}"
          - "{fourthbody}"
          - "{fifthbody}"
        streamDelay: "1s"
        replicas: 1
        requestCount: 1
        expectation:
          statusCode: 200
          payloadLength: 57
        autoInvoke: true
      - name: validate-payload
        method: POST
        protocol: "HTTP/2"
        url: "http://localhost:8082/echo/stream"
        streamPayload:
          - "{firstbody}"
          - "{secondbody}"
          - "{thirdbody}"
          - "{fourthbody}"
          - "{fifthbody}"
        streamDelay: "1s"
        replicas: 1
        requestCount: 1
        expectation:
          statusCode: 200
          payload: "{firstbody}{secondbody}{thirdbody}{fourthbody}{fifthbody}"
        autoInvoke: true
      - name: validate-headers
        method: POST
        protocol: "HTTP/2"
        url: "http://localhost:8082/echo/stream"
        streamPayload:
          - "{firstbody}"
          - "{secondbody}"
          - "{thirdbody}"
          - "{fourthbody}"
          - "{fifthbody}"
        streamDelay: "1s"
        replicas: 1
        requestCount: 1
        expectation:
          statusCode: 200
          headers:
            via-goto: test
