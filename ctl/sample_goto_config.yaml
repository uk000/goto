        autoInvoke: true
  invoke:
    - validate-status
    - validate-payload-length
    - validate-payload
    - validate-headers
jobs:
  config:
    - id: job1
      task:
        cmd: sh
        args:
          - -c
          - "for i in $(seq 2); do printf \"Hello %d - %d\n\" $i `date +%s`; sleep 1; done"
        outputMarkers:
          "1": "date"
          "3": "msg"
          outputSeparator: " "
      auto: false
      count: 1
      keepFirst: true
      maxResults: 5
      delay: 1s
      outputTrigger: job2
      finishTrigger: job2
    - id: job2
      task:
        cmd: sh
        args:
          - -c
          - 'printf `date +%s`; printf " Output {date} Processed"; sleep 1;'
        outputMarkers:
          "1": "ts1"
          "3": "ts2"
      auto: false
      count: 1
      keepFirst: true
      maxResults: 10
      initialDelay: 10s
      outputTrigger: job3
    - id: job3
      task:
        cmd: sh
        args:
          - -c
          - 'printf \"Finally {date} {ts2} {msg}\"; sleep 1;'
        outputMarkers:
          "1": "ts1"
          "3": "ts2"
      auto: false
      count: 1
      keepFirst: true
      maxResults: 10
      delay: 1s
  run:
    - job1
    - job2
    - job3
