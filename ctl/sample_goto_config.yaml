proxy:
  - http:
      port: 8080
      enabled: true
      proxyResponses:
        - upResponseRange: [500,510]
          proxyResponse: 500
        - upResponseRange: [400,499]
          proxyResponse: 418
        - upResponseRange: [300,399]
          proxyResponse: 300
        - upResponseRange: [201,299]
          proxyResponse: 418
      targets:
        target1:
          enabled: true
          trafficConfig:
            payload: true
            clean: true
            delay:
              min: 0s
              max: 0s
            retries: 1
          endpoints:
            ep1:
              url: http://localhost:8081
              method: GET
              protocol: HTTP/1.1
              authority: goto.uk
              tls: false
              requestCount: 1
              concurrent: 1
            ep2:
              url: http://localhost:8082
              method: GET
              protocol: HTTP/2
              authority: goto.uk
              tls: false
              requestCount: 1
              concurrent: 1
          transform:
            uriMap:
              /foo/{foo}: /foox/{bar}/barx/{foo}
              /bar/{bar}: /barxfoox/{foo}
            headers:
              add:
                main: "1"
              remove:
                - "*"
            queries:
              add:
                main: "2"
              remove:
                - "*"
            requestId:
              send: true
              uuid: true
              header: x-request-id
              query: request-id
          triggers:
            trigger1:
              matchAny:
                - uriPrefix: /foo/{foo}
                  headers:
                    bar: "{bar}"
                  vars:
                    foo:
                      in:
                        - "1"
                        - "2"
                    bar:
                      regex: aa.
                - uriPrefix: /bar/{bar}
                  headers:
                    foo: "{foo}"
                  vars:
                    foo:
                      in:
                        - "1"
                        - "2"
                    bar:
                      regex: bb.
              endpoints:
                - ep1
              transform:
                uriMap:
                  /foo/{foo}: /bar/{bar}
                  /bar/{bar}: /foo/{foo}
                headers:
                  add:
                    abc: "111"
                  remove:
                    - foo
                queries:
                  add:
                    a: qqq
                  remove:
                    - b
                requestId:
                  send: true
                  uuid: false
                  header: x-request-id
                  query: request-id
              trafficConfig:
                delay:
                  min: 0s
                  max: 0s
                retries: 1
            trigger2:
              matchAny:
                - uriPrefix: /foo/{foo}
                  headers:
                    bar: "{bar}"
                  vars:
                    foo:
                      exact: "11"
                    bar:
                      inRegex:
                        - a.
                        - b.
                - uriPrefix: /bar/{bar}
                  headers:
                    foo: "{foo}"
                  vars:
                    foo:
                      exact: "11"
                    bar:
                      inRegex:
                        - a.
                        - b.
              endpoints:
                - ep1
                - ep2
              transform:
                uriMap:
                  /foo/{foo}: /foo/{bar}/bar/{foo}
                  /bar/{bar}: /barfoo/{foo}
                headers:
                  add:
                    abc: "222"
                  remove:
                    - bar
                queries:
                  add:
                    b: zzz
                  remove:
                    - a
                requestId:
                  send: true
                  uuid: false
                  header: x-request-id
                  query: request-id
              trafficConfig:
                delay:
                  min: 0.1s
                  max: 0.1s
        target1.1:
          enabled: true
          trafficConfig:
            payload: false
            clean: false
          endpoints:
            ep8081:
              url: http://localhost:8081
              method: GET
              protocol: HTTP/1.1
              authority: goto.uk
              tls: false
              requestCount: 1
              concurrent: 1
          triggers:
            t1:
              matchAny:
                - uriPrefix: /foo/{foo}
